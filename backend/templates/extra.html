<!DOCTYPE html>
<html lang="en">
<head>
    <title>THE ART GALLERY'S PAINTINGS</title>

    <link rel="icon" type="image/x-icon" href="art-gallery/icon/1.png">
    <link rel="stylesheet" href="style1.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            background: url('crou/55.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        /* DARK OVERLAY FOR READABILITY */
        .overlay {
            min-height: 100vh;
            background: rgba(0,0,0,0.6);
            padding: 20px;
        }

        /* MAIN CARD */
        .upload-box {
            max-width: 600px;
            margin: auto;
            margin-top: 60px;
            padding: 25px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            backdrop-filter: blur(6px);
        }

        h2 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
        }

        input[type="file"] {
            background: white;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            background: #2563eb;
        }

        #preview {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            margin-top: 15px;
            border-radius: 10px;
        }

        #result {
            margin-top: 20px;
            color: white;
        }

        .bar {
            background: #334155;
            height: 18px;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .fill {
            height: 100%;
            background: #22c55e;
            border-radius: 5px;
        }

        @media (max-width: 768px) {
            .upload-box {
                margin-top: 30px;
                padding: 18px;
            }

            h2 {
                font-size: 20px;
            }
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light custom-navbar">
    <div class="container-fluid">

        <a class="navbar-brand" href="index.html" style="color:#f2f1ef">
            <strong>THE ART GALLERY</strong>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto d-flex flex-row">

                <li class="nav-item"><a class="nav-link" href="C:\FYP\test\index.html">HOME</a></li>
                <li class="nav-item"><a class="nav-link" href="C:\FYP\test\index.html#intro">INFO</a></li>
                <li class="nav-item"><a class="nav-link" href="C:\FYP\test\index.html#art_pieces">ART CATEGORY</a></li>
                <li class="nav-item"><a class="nav-link" href="C:\FYP\test\backend\templates\analysis.html">ANALYSIS</a></li>

            </ul>
        </div>
    </div>
</nav>

<!-- PAGE -->
<div class="overlay">

    <div class="upload-box">

        <h2>Emotion Recognition of Art</h2>

        <input type="file" id="imageInput" class="form-control">

        <br>

        <button onclick="uploadImage()">Analyze</button>

        <img id="preview">

        <div id="result"></div>

    </div>

</div>

<script>
document.getElementById("imageInput").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (file) {
        document.getElementById("preview").src = URL.createObjectURL(file);
    }
});

function uploadImage() {

    const file = document.getElementById("imageInput").files[0];

    if (!file) {
        alert("Please select an image first");
        return;
    }

    const formData = new FormData();
    formData.append("image", file);

    fetch("http://127.0.0.1:5000/analyze", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {

        let html = `<h4>Predicted: ${data.prediction}</h4>`;

        for (let key in data.scores) {
            html += `
                <p>${key}: ${data.scores[key]}%</p>
                <div class="bar">
                    <div class="fill" style="width:${data.scores[key]}%"></div>
                </div>
            `;
        }

        document.getElementById("result").innerHTML = html;
    })
    .catch(err => {
        console.log(err);
        document.getElementById("result").innerHTML =
            "<p style='color:red;'>Backend not responding</p>";
    });
}
</script>

</body>
</html>
